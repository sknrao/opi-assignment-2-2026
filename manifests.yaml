---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ovs-network
  namespace: default
spec:
  config: '{
      "cniVersion": "0.3.1",
      "type": "ovs",
      "bridge": "br0"
    }'
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: test-vm
  namespace: default
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/vm: test-vm
    spec:
      domain:
        devices:
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - name: default
              masquerade: {}
            - name: ovs-net
              bridge: {}
        resources:
          requests:
            memory: 128Mi
      networks:
        - name: default
          pod: {}
        - name: ovs-net
          multus:
            networkName: ovs-network
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/kubevirt/cirros-container-disk-demo:v0.59.0
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |-
              #!/bin/sh
              # Configure the secondary interface for OVS
              ip link set eth1 up
              ip addr add 192.168.100.10/24 dev eth1
