apiVersion: v1
kind: Namespace
metadata:
  name: vm-lab
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ovs-net
  namespace: vm-lab
spec:
  config: |-
    {
      "cniVersion": "0.4.0",
      "name": "ovs-net",
      "type": "ovs",
      "bridge": "br1",
      "ipam": {
        "type": "host-local",
        "subnet": "10.10.0.0/24",
        "rangeStart": "10.10.0.50",
        "rangeEnd": "10.10.0.100",
        "gateway": "10.10.0.1",
        "routes": [
          { "dst": "10.10.0.0/24" }
        ]
      }
    }
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: cirros-ovs-vm
  namespace: vm-lab
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/domain: cirros-ovs-vm
    spec:
      domain:
        cpu:
          cores: 1
        resources:
          requests:
            memory: 256M
        devices:
          interfaces:
            - name: default
              masquerade: {}
            - name: ovs-net
              bridge: {}
          disks:
            - name: containerdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
      networks:
        - name: default
          pod: {}
        - name: ovs-net
          multus:
            networkName: ovs-net
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/kubevirt/cirros-container-disk-demo:latest
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |-
              #cloud-config
              password: gocubsgo
              chpasswd:
                expire: false
              ssh_pwauth: true
              runcmd:
                - ip link set eth1 up || true
                - ip addr add 10.10.0.20/24 dev eth1 || true
                - ip route add 10.10.0.0/24 dev eth1 || true
---
apiVersion: v1
kind: Pod
metadata:
  name: ovs-test-pod
  namespace: vm-lab
  annotations:
    k8s.v1.cni.cncf.io/networks: ovs-net
spec:
  restartPolicy: Always
  containers:
    - name: tester
      image: busybox:1.36
      command: ["/bin/sh", "-c", "ip addr show; sleep 365d"]
      securityContext:
        capabilities:
          add:
            - NET_RAW
