# manifests.yaml — VM lab on the OVS secondary network
#
# Topology (what this YAML sets up):
#
#   +---------------------------------+
#   |     k3s host (this Debian VM)   |
#   |                                 |
#   |   br-ovs  192.168.200.1/30      |   <-- OVS bridge (kernel datapath)
#   |     |                           |
#   |     | veth leg                  |
#   |     v                           |
#   |   virt-launcher pod (kubevirt)  |   <-- runs the QEMU/KVM VM
#   |     |                           |
#   |     | tap                       |
#   |     v                           |
#   |   CirrOS VM  192.168.200.2/30   |   <-- eth0 (virtio-net, static IP via
#   +---------------------------------+      cloud-init runcmd)
#
# Apply with: kubectl apply -f manifests.yaml
# Then:        virtctl -n vm-lab start cirros-vm
#
# Note: cloud-init network-config v1 YAML is unreliable on CirrOS's
# stripped-down cloud-init; we set the static IP via userdata runcmd
# instead, which is the documented KubeVirt example pattern.
#
# Caveat for this CirrOS image (quay.io/kubevirt/cirros-container-disk-demo,
# Linux 4.4.0-28-generic, BusyBox 1.23.2): cloud-init's runcmd block
# does NOT auto-execute during boot. The VM comes up with eth0 up
# (via the kubevirt binding plugin) but without an IPv4 address. You
# have to set the IP from the VM console:
#   virtctl -n vm-lab console cirros-vm
#     login: cirros / gocubsgo
#     sudo -i
#     ip addr add 192.168.200.2/30 dev eth0
#     ip route add default via 192.168.200.1 dev eth0
#     exit (Ctrl-])
# The runcmd block is kept so the userdata is correct on a newer
# CirrOS image; on this one the manual step is required.
---
apiVersion: v1
kind: Namespace
metadata:
  name: vm-lab
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ovs-net
  namespace: vm-lab
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "type": "ovs",
      "bridge": "br-ovs",
      "vlan": 0
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: cirros-userdata
  namespace: vm-lab
type: Opaque
stringData:
  # cloud-init user-data — single password, plus a runcmd that sets the static IP on eth0.
  # The other half of the /30 (192.168.200.1) lives on br-ovs on the host.
  userdata: |
    #cloud-config
    password: cirros
    chpasswd:
      expire: false
    runcmd:
      - ip addr flush dev eth0 || true
      - ip addr add 192.168.200.2/30 dev eth0
      - ip link set eth0 up
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: cirros-vm
  namespace: vm-lab
  labels:
    app: cirros-vm
spec:
  runStrategy: Manual
  template:
    metadata:
      labels:
        app: cirros-vm
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 512Mi
        devices:
          interfaces:
            - name: ovs-net
              # ovsTap binding plugin (registered in KubeVirt CR with
              # domainAttachmentType: managedTap). managedTap creates its
              # own tap device on the host and bridges it to the
              # pod-side veth that OVS-CNI creates, sidestepping the
              # "veth cannot be opened as a tap" issue that plain `tap`
              # hits when the underlying device is a veth (not a tap).
              binding:
                name: ovsTap
              macAddress: "52:54:00:6c:6f:01"
          disks:
            - name: containerdisk
              disk: {}
            - name: cloudinit
              disk: {}
        resources:
          requests:
            memory: 512Mi
      networks:
        - name: ovs-net
          multus:
            networkName: ovs-net
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/kubevirt/cirros-container-disk-demo:latest
        - name: cloudinit
          cloudInitNoCloud:
            # Note: the Go struct field is UserDataSecretRef but the JSON tag
            # is `secretRef` (legacy alias). Use `secretRef:` here, not
            # `userDataSecretRef:` (would fail strict decoding).
            secretRef:
              name: cirros-userdata