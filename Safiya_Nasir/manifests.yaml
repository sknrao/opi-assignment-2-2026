---
# NetworkAttachmentDefinition for Open vSwitch secondary network.
# Uses host-local IPAM to assign static IPs inside the 192.168.100.0/24 subnet.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ovs-net
  namespace: default
  annotations:
    description: "Network attachment definition for secondary OVS CNI network"
spec:
  config: |-
    {
      "cniVersion": "0.4.0",
      "type": "ovs",
      "bridge": "br0",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.100.0/24",
        "routes": [{"dst": "0.0.0.0/0"}],
        "gateway": "192.168.100.1"
      }
    }
---
# Virtual Machine 1 (Client Role)
# Attached to primary Kubernetes pod network and secondary OVS network.
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: test-vm-1
  namespace: default
  labels:
    kubevirt.io/vm: test-vm-1
    app: ovs-demo
    component: vm
    role: client
  annotations:
    description: "VM 1 (Client) connected to OVS secondary network"
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/vm: test-vm-1
        app: ovs-demo
        component: vm
        role: client
    spec:
      domain:
        devices:
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - name: default
              masquerade: {}    # Primary Kubernetes pod network interface (NATed)
            - name: ovs-net
              bridge: {}        # Secondary interface attached to OVS bridge
              macAddress: "02:00:00:00:00:01" # Deterministic MAC for flow tracking
        resources:
          requests:
            memory: 128Mi
            cpu: 1
          limits:
            memory: 128Mi
            cpu: 1
      networks:
        - name: default
          pod: {}
        - name: ovs-net
          multus:
            networkName: default/ovs-net
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/kubevirt/cirros-container-disk-demo:v0.59.0
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |-
              #!/bin/sh
              # Bring up the secondary OVS-attached network interface
              ip link set eth1 up
              # Configure static IP address on eth1 (OVS datapath)
              ip addr add 192.168.100.10/24 dev eth1
              # Configure default route through OVS bridge gateway
              ip route add default via 192.168.100.1 dev eth1
      nodeSelector:
        kubernetes.io/hostname: ovs-lab-worker # Schedule on worker node where OVS bridge br0 is active
---
# Virtual Machine 2 (Server Role)
# Attached to primary Kubernetes pod network and secondary OVS network.
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: test-vm-2
  namespace: default
  labels:
    kubevirt.io/vm: test-vm-2
    app: ovs-demo
    component: vm
    role: server
  annotations:
    description: "VM 2 (Server) connected to OVS secondary network"
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/vm: test-vm-2
        app: ovs-demo
        component: vm
        role: server
    spec:
      domain:
        devices:
          disks:
            - disk:
                bus: virtio
              name: containerdisk
            - disk:
                bus: virtio
              name: cloudinitdisk
          interfaces:
            - name: default
              masquerade: {}    # Primary Kubernetes pod network interface (NATed)
            - name: ovs-net
              bridge: {}        # Secondary interface attached to OVS bridge
              macAddress: "02:00:00:00:00:02" # Deterministic MAC for flow tracking
        resources:
          requests:
            memory: 128Mi
            cpu: 1
          limits:
            memory: 128Mi
            cpu: 1
      networks:
        - name: default
          pod: {}
        - name: ovs-net
          multus:
            networkName: default/ovs-net
      volumes:
        - name: containerdisk
          containerDisk:
            image: quay.io/kubevirt/cirros-container-disk-demo:v0.59.0
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |-
              #!/bin/sh
              # Bring up the secondary OVS-attached network interface
              ip link set eth1 up
              # Configure static IP address on eth1 (OVS datapath)
              ip addr add 192.168.100.20/24 dev eth1
              # Configure default route through OVS bridge gateway
              ip route add default via 192.168.100.1 dev eth1
      nodeSelector:
        kubernetes.io/hostname: ovs-lab-worker # Schedule on worker node where OVS bridge br0 is active