apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ovs-net
spec:
  config: |
    {
      "cniVersion":"0.3.1",
      "type":"ovs",
      "bridge":"ovs-br0"
    }
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: cirros-vm
spec:
  running: true
  template:
    metadata:
      labels:
        kubevirt.io/domain: cirros-vm
    spec:
      domain:
        devices:
          disks:
          - name: containerdisk
            disk:
              bus: virtio
          interfaces:
          - name: default
            masquerade: {}
          - name: ovsnet
            bridge: {}
        resources:
          requests:
            memory: 128Mi
      networks:
      - name: default
        pod: {}
      - name: ovsnet
        multus:
          networkName: ovs-net
      terminationGracePeriodSeconds: 0
      volumes:
      - name: containerdisk
        containerDisk:
          image: quay.io/kubevirt/cirros-container-disk-demo:latest
