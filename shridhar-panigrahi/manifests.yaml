---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cpu-mode-hook
  namespace: default
data:
  onDefineDomain.sh: |
    #!/bin/sh
    tempFile=$(mktemp)
    echo "$4" > $tempFile
    sed -i "s/host-passthrough/maximum/g" $tempFile
    cat $tempFile
---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ovs-net
  namespace: default
  annotations:
    k8s.v1.cni.cncf.io/resourceName: ovs-cni.network.kubevirt.io/br1
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "type": "ovs",
      "bridge": "br1"
    }
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-a
  namespace: default
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm-a
      annotations:
        hooks.kubevirt.io/hookSidecars: '[{"args": ["--version", "v1alpha2"], "image": "quay.io/kubevirt/sidecar-shim:v1.8.4", "configMap": {"name": "cpu-mode-hook", "key": "onDefineDomain.sh", "hookPath": "/usr/bin/onDefineDomain"}}]' 
    spec:
      domain:
        cpu:
          cores: 1
        devices:
          logSerialConsole: true
          disks:
          - name: containerdisk
            disk:
              bus: virtio
          - name: cloudinitdisk
            disk:
              bus: virtio
          interfaces:
          - name: ovs
            bridge: {}
        resources:
          requests:
            memory: 256Mi
      networks:
      - name: ovs
        multus:
          networkName: default/ovs-net
      terminationGracePeriodSeconds: 0
      volumes:
      - name: containerdisk
        containerDisk:
          image: cirros-arm64-containerdisk:0.6.3
          imagePullPolicy: IfNotPresent
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #!/bin/sh
            ip addr add 10.10.10.11/24 dev eth0
            ip link set eth0 up
            echo "vm-a: eth0 configured 10.10.10.11/24" > /dev/console
            sleep 45
            echo "=== ping test: vm-a (10.10.10.11) -> vm-b (10.10.10.12) over OVS bridge br1 ===" > /dev/console
            ping -c 20 10.10.10.12 > /dev/console 2>&1
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: vm-b
  namespace: default
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        kubevirt.io/vm: vm-b
      annotations:
        hooks.kubevirt.io/hookSidecars: '[{"args": ["--version", "v1alpha2"], "image": "quay.io/kubevirt/sidecar-shim:v1.8.4", "configMap": {"name": "cpu-mode-hook", "key": "onDefineDomain.sh", "hookPath": "/usr/bin/onDefineDomain"}}]' 
    spec:
      domain:
        cpu:
          cores: 1
        devices:
          logSerialConsole: true
          disks:
          - name: containerdisk
            disk:
              bus: virtio
          - name: cloudinitdisk
            disk:
              bus: virtio
          interfaces:
          - name: ovs
            bridge: {}
        resources:
          requests:
            memory: 256Mi
      networks:
      - name: ovs
        multus:
          networkName: default/ovs-net
      terminationGracePeriodSeconds: 0
      volumes:
      - name: containerdisk
        containerDisk:
          image: cirros-arm64-containerdisk:0.6.3
          imagePullPolicy: IfNotPresent
      - name: cloudinitdisk
        cloudInitNoCloud:
          userData: |
            #!/bin/sh
            ip addr add 10.10.10.12/24 dev eth0
            ip link set eth0 up
            echo "vm-b: eth0 configured 10.10.10.12/24" > /dev/console
