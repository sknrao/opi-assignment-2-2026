---
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: ovs-network
  namespace: ovs-test
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "ovs-network",
      "type": "bridge",
      "bridge": "br-ovs",
      "isGateway": true,
      "ipMasq": true,
      "mtu": 1500,
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.100.0/24",
        "rangeStart": "192.168.100.10",
        "rangeEnd": "192.168.100.50",
        "gateway": "192.168.100.1",
        "routes": [
          { "dst": "0.0.0.0/0" }
        ]
      }
    }
---
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: cirros-vm
  namespace: ovs-test
spec:
  runStrategy: Always
  template:
    spec:
      domain:
        cpu:
          cores: 1
        memory:
          guest: 256Mi
        devices:
          disks:
            - name: root
              disk:
                bus: virtio
            - name: cloudinit
              disk:
                bus: virtio
          interfaces:
            - name: eth0
              masquerade: {}
            - name: net1
              bridge: {}
      networks:
        - name: eth0
          pod: {}
        - name: net1
          multus:
            networkName: ovs-test/ovs-network
      volumes:
        - name: root
          containerDisk:
            image: quay.io/kubevirt/cirros-container-disk-demo:v1.8.2
        - name: cloudinit
          cloudInitNoCloud:
            userData: |
              #!/bin/sh
              ip addr add 192.168.100.100/24 dev eth1
              ip link set eth1 up
              ip route add default via 192.168.100.1 dev eth1 2>/dev/null || true
